# BiliAnalysis 配置文件
# 复制为 config.yaml 使用，所有字段均有默认值

# ── 爬虫 ──
crawler:
  request_delay: 3.5             # 请求间隔（秒），含 ±1s 随机抖动
  max_retries: 3                 # 单周最大重试次数
  retry_delay: 1.0               # 重试间隔（秒），指数退避起点
  cookie: ""                     # B站 Cookie（可选，提升请求权重）
  key_refresh_interval: 50       # 主动刷新 WBI 密钥的请求间隔（0=不刷新）
  max_requests_per_session: 80   # Session 复用上限（0=不限制）

# ── 分析引擎 ──
analysis:
  engine: pandas                 # pandas | spark

# ── 数据路径 ──
data:
  raw_dir: data/raw              # 爬取原始 JSON
  processed_dir: data/processed  # 清洗后 Parquet
  reports_dir: data/reports      # 分析结果 JSON

# ── 定时调度 ──
scheduler:
  pipelines:
    # 爬取流水线：每周一早 9 点自动执行
    crawl:
      schedule: "0 9 * * 1"
      steps: [crawl]
      step_failure: stop

    # 分析流水线：手动触发
    analysis:
      schedule: ""
      steps: [clean_data, statistics, clustering, prediction, keywords]
      step_failure: stop

    # 数据入库流水线：手动触发
    db_load:
      schedule: ""
      steps: [db_load]
      step_failure: stop

    # Warehouse 构建流水线：手动触发
    warehouse:
      schedule: ""
      steps: [build_warehouse]
      step_failure: stop

    # 完整流水线：手动触发（爬取 + 分析 + 入库 + Warehouse 一站式）
    full:
      schedule: ""
      steps: [crawl, clean_data, statistics, clustering, prediction, build_warehouse]
      step_failure: skip

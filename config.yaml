# BiliAnalysis 配置
# 用法: 复制为 config.yaml，修改后使用
# 所有字段均有默认值，可全部省略

# ── 爬虫 ──
crawler:
  request_delay: 3.5         # 请求间隔（秒），含 ±1s 随机抖动
  max_retries: 3             # 单周最大重试次数
  retry_delay: 1.0           # 重试间隔（秒），指数退避起点
  cookie: ""                 # B站 Cookie（可选，提升请求权重，绕过部分反爬）
  key_refresh_interval: 50   # 主动刷新 WBI 密钥的请求间隔（0=仅失效时刷新）
  max_requests_per_session: 80  # Session 复用上限（0=不限制，超过后新建 TCP 连接）

# ── 分析引擎 ──
analysis:
  engine: spark             # pandas | spark

  # Spark 引擎配置（仅 engine: spark 时生效）
  spark_remote: "sc://192.168.121.134:15002"   # Spark Connect gRPC 端点
  webhdfs_url: "http://192.168.121.134:9870"   # WebHDFS REST API
  #spark_ping_timeout: 10.0          # 连通检查超时秒数（0=跳过）
  #spark_ping_retries: 3             # 最大重试次数
  #spark_ping_retry_delay: 60.0      # 重试间隔秒数

# ── 数据路径 ──
data:
  raw_dir: data/raw          # 爬取原始 JSON
  processed_dir: data/processed  # 清洗后 Parquet
  reports_dir: data/reports  # 分析结果 JSON

# ── 定时调度 (可选) ──
scheduler:
  pipelines:
    # 爬取流水线：每周一早 9 点自动执行
    crawl:
      schedule: "0 9 * * 1"
      steps: [crawl]
      step_failure: stop

    # 分析流水线：手动触发
    analysis:
      schedule: ""
      steps: [clean_data, statistics, clustering, prediction]
      step_failure: stop

    # 数据入库流水线：手动触发
    db_load:
      schedule: ""
      steps: [db_load]
      step_failure: stop

    # Warehouse 构建流水线：手动触发
    warehouse:
      schedule: ""
      steps: [build_warehouse]
      step_failure: stop

    # 完整流水线：手动触发（爬取 + 分析 + 入库 + Warehouse 一站式）
    full:
      schedule: ""
      steps: [crawl, clean_data, statistics, clustering, prediction, build_warehouse]
      step_failure: skip

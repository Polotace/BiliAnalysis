[project]
name = "bilianalysis"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "aiohttp>=3.14.1",
    "fake-useragent>=2.2.0",
    "pydantic>=2.13.4",
]

[dependency-groups]
dev = [
    "pytest>=9.1.0",
    "pytest-asyncio>=1.4.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.setuptools]
packages = ["src/crawler", "src/utils"]
package-dir = {"" = "src"}

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"